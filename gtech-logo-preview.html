<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>G-Tech — Logo A Production Files</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0B0C0E; font-family:'Satoshi',sans-serif; color:#F4F5F7; padding:48px 24px; }
  h1 { font-family:'Clash Display',sans-serif; font-weight:700; font-size:22px; color:#F2541D; margin-bottom:6px; letter-spacing:-0.02em; }
  .sub { font-size:12px; color:#9AA0AA; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:48px; }
  .row { display:flex; flex-direction:column; gap:32px; max-width:700px; }
  .block { display:flex; flex-direction:column; gap:16px; }
  .preview {
    border-radius:14px;
    padding:40px 48px;
    display:flex;
    align-items:center;
  }
  .preview-dark { background:#14161B; border:1px solid #1B1E24; }
  .preview-light { background:#F4F5F7; border:1px solid #E0E2E7; }
  .preview-icon { background:#14161B; border:1px solid #1B1E24; justify-content:flex-start; gap:20px; }
  .meta { display:flex; justify-content:space-between; align-items:center; }
  .tag { font-size:11px; font-weight:600; color:#9AA0AA; letter-spacing:0.08em; text-transform:uppercase; }
  .note { font-size:12px; color:#9AA0AA; }
</style>
</head>
<body>
<h1>G-Tech Engineering</h1>
<p class="sub">Concept A — Drill Bit Mark · Production files</p>

<div class="row">

  <!-- Dark -->
  <div class="block">
    <div class="meta">
      <span class="tag">Dark / Screen</span>
      <span class="note">gtech-logo-dark.svg</span>
    </div>
    <div class="preview preview-dark">
      <svg width="280" height="72" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="32" width="44" height="14" rx="2.5" fill="#F2541D"/>
        <rect x="44" y="26" width="11" height="26" rx="1.5" fill="#F2541D"/>
        <rect x="55" y="21" width="9" height="36" rx="1.5" fill="#CC3F10"/>
        <rect x="64" y="16" width="7" height="46" rx="1.5" fill="#F2541D"/>
        <polygon points="71,39 88,28 88,50" fill="#CC3F10"/>
        <polygon points="88,28 98,39 88,50" fill="#F2541D"/>
        <text x="114" y="34" font-family="'Clash Display',Arial Black,sans-serif" font-weight="700" font-size="30" fill="#F4F5F7" letter-spacing="-0.5">G-TECH</text>
        <text x="115" y="56" font-family="'Satoshi',Arial,sans-serif" font-weight="500" font-size="13" fill="#9AA0AA" letter-spacing="3.5">ENGINEERING</text>
      </svg>
    </div>
  </div>

  <!-- Light -->
  <div class="block">
    <div class="meta">
      <span class="tag">Light / Print</span>
      <span class="note">gtech-logo-light.svg</span>
    </div>
    <div class="preview preview-light">
      <svg width="280" height="72" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="32" width="44" height="14" rx="2.5" fill="#F2541D"/>
        <rect x="44" y="26" width="11" height="26" rx="1.5" fill="#F2541D"/>
        <rect x="55" y="21" width="9" height="36" rx="1.5" fill="#CC3F10"/>
        <rect x="64" y="16" width="7" height="46" rx="1.5" fill="#F2541D"/>

        <text x="115" y="56" font-family="'Satoshi',Arial,sans-serif" font-weight="500" font-size="13" fill="#5A6070" letter-spacing="3.5">ENGINEERING</text>
      </svg>
    </div>
  </div>

    <div class="meta">

        <rect x="26" y="29" width="8" height="21" rx="1.5" fill="#F2541D"/>
        <rect x="34" y="24" width="6" height="31" rx="1.5" fill="#CC3F10"/>
        <rect x="40" y="18" width="5" height="43" rx="1.5" fill="#F2541D"/>

        <rect x="26" y="29" width="8" height="21" rx="1.5" fill="#F2541D"/>

      </svg>
      <div style="display:flex;flex-direction:column;gap:4px;margin-left:8px;">
        <span style="font-size:11px;color:#9AA0AA;">80 · 48 · 32 · 16 px</span>
        <span style="font-size:11px;color:#9AA0AA;">Replace the GT text favicon in index.html</span>

</body>
</html>
